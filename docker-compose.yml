version: '3.8'

services:
  wzmlx:
    build: .
    container_name: wzmlx
    restart: unless-stopped
    volumes:
      - ./downloads:/usr/src/app/downloads
      - ./config.py:/usr/src/app/config.py
      - ./token.pickle:/usr/src/app/token.pickle
      - ./rclone.conf:/usr/src/app/rclone.conf
      - ./accounts:/usr/src/app/accounts
    env_file:
      - .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
